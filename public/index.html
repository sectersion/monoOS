<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonoOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col font-mono text-gray-800">

    <img src="assets/images/background.jpg" class="fixed inset-0 w-full h-full object-cover -z-50" alt="Wallpaper">

    <div id="menubar" class="h-8 bg-white/30 backdrop-blur-md border-b border-white/50 flex items-center justify-between px-4 z-50">
        <span class="font-semibold text-sm">MonoOS</span>
        <div id="clock" class="text-sm tabular-nums">--:--</div>
    </div>

    <div id="desktop" class="relative flex-grow overflow-hidden">
        </div>

    <div id="appbar" class="absolute bottom-4 left-1/2 -translate-x-1/2 h-16 px-6 bg-white/30 backdrop-blur-md border border-white/50 rounded-3xl shadow-xl flex items-center justify-center gap-4 z-50">
    
    <div id="notepad" class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center cursor-pointer hover:scale-105 transition-transform text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
        </svg>
    </div>

    <div id="aboutme" class="w-10 h-10 bg-purple-500 rounded-xl flex items-center justify-center cursor-pointer hover:scale-105 transition-transform text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
    </div>

    <div id="terminal" class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center cursor-pointer hover:scale-105 transition-transform text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
        </svg>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
